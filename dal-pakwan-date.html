<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dal Pakwan Date?</title>
  <style>
    :root {
      --bg-1: #fff4dc;
      --bg-2: #ffd2a6;
      --card: rgba(255, 251, 244, 0.78);
      --text: #4a2b13;
      --accent: #cb5f2a;
      --accent-dark: #9d3f15;
      --soft: #ffe8c9;
      --shadow: 0 24px 70px rgba(126, 61, 20, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.75), transparent 32%),
        radial-gradient(circle at bottom right, rgba(255, 235, 205, 0.95), transparent 26%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
    }

    .card {
      position: relative;
      width: min(92vw, 760px);
      padding: 48px 32px 120px;
      border: 1px solid rgba(157, 63, 21, 0.12);
      border-radius: 32px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      text-align: center;
    }

    .badge {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: var(--soft);
      font-size: 0.92rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 5vw, 4.7rem);
      line-height: 1;
    }

    p {
      max-width: 560px;
      margin: 20px auto 0;
      font-size: clamp(1.05rem, 2vw, 1.3rem);
      line-height: 1.6;
    }

    .buttons {
      position: relative;
      height: 180px;
      margin-top: 34px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 16px 28px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(126, 61, 20, 0.2);
    }

    .yes {
      position: relative;
      z-index: 2;
      background: var(--accent);
      color: #fff8ef;
    }

    .yes:hover {
      background: var(--accent-dark);
    }

    .no {
      position: absolute;
      left: calc(50% + 42px);
      top: 82px;
      background: #fff7eb;
      color: var(--accent-dark);
      border: 1px solid rgba(157, 63, 21, 0.18);
    }

    .message {
      margin-top: 28px;
      min-height: 36px;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-dark);
    }

    .hearts {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      bottom: -30px;
      font-size: 24px;
      opacity: 0;
      animation: floatUp 2.8s ease-in forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.8);
        opacity: 0;
      }
      20% {
        opacity: 1;
      }
      100% {
        transform: translateY(-240px) scale(1.2) rotate(12deg);
        opacity: 0;
      }
    }

    @media (max-width: 640px) {
      .card {
        padding-bottom: 150px;
      }

      .buttons {
        height: 220px;
      }

      .no {
        left: calc(50% + 8px);
        top: 112px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">For my loving wife</div>
    <h1>Will you go out for delicious dal pakwan with me?</h1>
    <p>
      I am officially requesting one date, one smile, and one unforgettable plate of dal pakwan.
      Please choose wisely.
    </p>

    <div class="buttons" id="buttonArea">
      <button class="yes" id="yesBtn" type="button">Yes, obviously</button>
      <button class="no" id="noBtn" type="button" aria-label="No">No</button>
    </div>

    <div class="message" id="message"></div>
    <div class="hearts" id="hearts"></div>
  </main>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const area = document.getElementById("buttonArea");
    const message = document.getElementById("message");
    const hearts = document.getElementById("hearts");

    function moveNoButton() {
      const areaRect = area.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();
      const maxX = Math.max(0, areaRect.width - btnRect.width);
      const maxY = Math.max(0, areaRect.height - btnRect.height);

      const nextX = Math.random() * maxX;
      const nextY = Math.random() * maxY;

      noBtn.style.left = nextX + "px";
      noBtn.style.top = nextY + "px";
    }

    function celebrate() {
      message.textContent = "Perfect. Dal pakwan date confirmed.";
      noBtn.style.display = "none";

      for (let i = 0; i < 14; i += 1) {
        const heart = document.createElement("span");
        heart.className = "heart";
        heart.textContent = i % 2 === 0 ? "❤" : "❥";
        heart.style.left = Math.random() * 100 + "%";
        heart.style.animationDelay = i * 0.06 + "s";
        hearts.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 3000);
      }
    }

    ["mouseenter", "pointerenter", "touchstart", "focus"].forEach((eventName) => {
      noBtn.addEventListener(eventName, moveNoButton);
    });

    noBtn.addEventListener("click", moveNoButton);
    yesBtn.addEventListener("click", celebrate);
  </script>
</body>
</html>
